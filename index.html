<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinity Travel</title>
    <!-- Leaflet.js のCSSとJS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111216;
            color: #f3f4f6;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #111216;
        }

        header {
            background: rgba(17, 18, 22, 0.95);
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #272a34;
            z-index: 20;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            margin-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
        }

        #tab-home {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        .tab-content.active {
            display: block;
        }

        .scroll-content {
            padding: 16px 14px;
            height: 100%;
            overflow-y: auto;
            background-color: #111216;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #1a1b20;
            filter: grayscale(100%) invert(90%) hue-rotate(180deg) brightness(95%) contrast(105%);
        }

        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(70px + env(safe-area-inset-bottom, 0px));
            background: rgba(17, 18, 22, 0.95);
            border-top: 1px solid #272a34;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(10px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-item.active {
            color: #ffffff;
            font-weight: 700;
        }

        .nav-item.active svg {
            transform: translateY(-2px);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #111216;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
            background: #e2e8f0;
        }

        .btn-secondary {
            background: #272a34;
            color: #ffffff;
            border: 1px solid #3f4454;
            box-shadow: none;
        }

        .card {
            background: #181920;
            border: 1px solid #272a34;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 0.03em;
        }

        .floating-status {
            background: rgba(24, 25, 32, 0.95);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: #94a3b8;
            border: 1px solid #272a34;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            backdrop-filter: blur(8px);
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .badge-item {
            background: #1e202a;
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            font-size: 0.7rem;
            filter: grayscale(100%);
            opacity: 0.3;
            border: 1px solid #272a34;
        }

        .badge-item.unlocked {
            filter: grayscale(0%);
            opacity: 1;
            background: #242736;
            border-color: #ffffff;
        }

        .badge-icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .badge-name {
            font-weight: 700;
            color: #ffffff;
        }

        .select-box {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #272a34;
            font-size: 0.85rem;
            margin-bottom: 10px;
            background-color: #1e202a;
            color: #ffffff;
            outline: none;
        }

        .toast {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #ffffff;
            color: #111216;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            text-align: center;
            width: 85%;
            max-width: 320px;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        ul {
            list-style: none;
        }

        li {
            padding: 8px 0;
            border-bottom: 1px solid #1e202a;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        
        li:last-child {
            border-bottom: none;
        }

        /* 📅 カレンダーUI */
        .calendar-container {
            display: flex;
            flex-direction: column;
            background: #181920;
            border: 1px solid #272a34;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 14px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .calendar-header button {
            background: #272a34;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .weekday-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            padding-bottom: 4px;
        }

        .calendar-day {
            background: #1e202a;
            border: 1px solid #272a34;
            border-radius: 6px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .calendar-day:active {
            transform: scale(0.95);
        }

        .calendar-day.empty {
            background: transparent;
            border: none;
            cursor: default;
        }

        .calendar-day.has-history {
            border-color: #ff3b30;
            background: rgba(255, 59, 48, 0.08);
            color: #ffffff;
        }

        .calendar-day.has-history::after {
            content: '';
            width: 3px;
            height: 3px;
            background: #ff3b30;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
        }

        .calendar-day.selected {
            background: #ff3b30 !important;
            color: #ffffff !important;
            border-color: #ff3b30 !important;
            box-shadow: 0 3px 8px rgba(255, 59, 48, 0.4);
        }

        .calendar-day.selected::after {
            background: #ffffff;
        }

        .history-detail-card {
            background: #181920;
            border: 1px solid #272a34;
            border-radius: 14px;
            padding: 16px;
        }

        .history-tag {
            display: inline-block;
            padding: 2px 6px;
            background: #272a34;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        /* 🚀 ブートアニメーション画面 */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 0.5s ease-out;
        }

        /* 🆕 ロゴ用スタイル */
        .logo-text {
            font-family: 'Arial Black', sans-serif;
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            color: #ffffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .infinity-symbol {
            color: #ff3b30;
            font-size: 3rem;
        }

        .boot-terminal {
            width: 100%;
            max-width: 340px;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
            color: #00ff66;
            text-align: left;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .boot-row {
            opacity: 0;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .boot-row.visible {
            opacity: 1;
        }

        .boot-success {
            font-weight: bold;
            background: #00ff66;
            color: #0b0c10;
            padding: 0 6px;
            border-radius: 3px;
        }

        .start-alert {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.05em;
        }

        .start-alert.visible {
            opacity: 1;
            transform: scale(1);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 255, 102, 0.2);
            border-top: 3px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 🚀 ブートアニメーション画面 -->
    <div id="boot-screen">
        <div class="logo-text"><span class="infinity-symbol">∞</span> Infinity Travel</div>
        <div id="boot-spinner" class="spinner"></div>
        <div class="boot-terminal">
            <div id="row1" class="boot-row"><span>> index.html loading...</span><span class="boot-success">OK</span></div>
            <div id="row2" class="boot-row"><span>> system initialization...</span><span class="boot-success">OK</span></div>
            <div id="row3" class="boot-row"><span>> data sync...</span><span id="json-status-text">WAIT</span></div>
            <div id="row4" class="boot-row"><span>> mapping ready...</span><span class="boot-success">OK</span></div>
        </div>
        <div id="start-msg" class="start-alert">
            起動完了<br>探索を始めよう
        </div>
    </div>

    <div class="phone-container">
        <!-- 通知トースト -->
        <div id="toast" class="toast">実績を解除しました！</div>
        <header id="app-title">Infinity Travel</header>

        <div class="content-area">
            <!-- 1. ホームタブ（マップ表示） -->
            <div id="tab-home" class="tab-content active">
                <div id="map"></div>
                <div class="map-overlay">
                    <div id="location-status" class="floating-status">READY TO EXPLORE</div>
                    <button class="btn" onclick="handleCheckIn()">📍 CHECK IN</button>
                </div>
            </div>

            <!-- 2. 実績タブ -->
            <div id="tab-achievements" class="tab-content">
                <div class="scroll-content">
                    <div class="card" style="margin-bottom: 16px; background: #181920; border: 1px solid #272a34;">
                        <div style="display:flex; justify-content:space-around; text-align:center;">
                            <div>
                                <div style="font-size:1.4rem; font-weight:800; color:#ffffff;" id="stats-count">0</div>
                                <div style="font-size:0.7rem; color:#94a3b8; margin-top:4px;">解放都市</div>
                            </div>
                            <div style="border-left: 1px solid #272a34;"></div>
                            <div>
                                <div style="font-size:1.4rem; font-weight:800; color:#ffffff;" id="stats-badges">0</div>
                                <div style="font-size:0.7rem; color:#94a3b8; margin-top:4px;">獲得実績</div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">ACHIEVEMENTS</div>
                        <div class="badge-grid" id="badge-container"></div>
                    </div>
                </div>
            </div>

            <!-- 3. 📅 履歴タブ -->
            <div id="tab-history" class="tab-content">
                <div class="scroll-content">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">◀</button>
                            <span id="calendar-month-year">2026年 07月</span>
                            <button onclick="changeMonth(1)">▶</button>
                        </div>
                        <div class="calendar-grid" id="calendar-days-grid"></div>
                    </div>

                    <div class="history-detail-card" id="history-detail-section">
                        <div class="history-tag" id="detail-date-label">日付を選択</div>
                        <div class="card-title" style="font-size:0.85rem; margin-bottom:8px;">🕒 記録詳細</div>
                        <div style="margin-bottom:12px;">
                            <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:4px; font-weight:700;">🔓 解放エリア</div>
                            <ul id="detail-cities-list" style="padding-left:2px;">
                                <li style="color:#64748b; font-size:0.8rem;">日付を選択してください</li>
                            </ul>
                        </div>
                        <div>
                            <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:4px; font-weight:700;">🏆 獲得実績</div>
                            <ul id="detail-badges-list" style="padding-left:2px;">
                                <li style="color:#64748b; font-size:0.8rem;">日付を選択してください</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. プロフィールタブ -->
            <div id="tab-profile" class="tab-content">
                <div class="scroll-content">
                    <div class="card" style="text-align: center; background: linear-gradient(180deg, #1e202a 0%, #181920 100%); padding: 14px;">
                        <div style="width: 56px; height: 56px; background: #272a34; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 10px; font-size: 1.6rem; border: 1px solid #3f4454;">👤</div>
                        <div class="card-title" style="margin-bottom: 4px; font-size:0.9rem;">EXPLORER</div>
                        <span style="background: #ffffff; color: #111216; padding: 2px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800;">LV. <span id="profile-level">1</span></span>
                    </div>
                    <div class="card">
                        <div class="card-title">🧭 解放履歴</div>
                        <ul id="unlocked-cities-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="switchTab('home', 'Infinity Travel')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                MAP
            </button>
            <button class="nav-item" onclick="switchTab('achievements', 'ACHIEVEMENTS')">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.25z"/></svg>
                BADGES
            </button>
            <button class="nav-item" onclick="switchTab('history', 'HISTORY')">
                <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v2h-5z"/></svg>
                HISTORY
            </button>
            <button class="nav-item" onclick="switchTab('profile', 'PROFILE')">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                PROFILE
            </button>
        </nav>
    </div>

    <script>
        // ... JavaScriptロジックは変更なし ...
        const prefCoordinates = {

            "05": [39.7186, 140.1033], "06": [38.2404, 140.3633], "07": [37.7503, 140.4676], "08": [36.3418, 140.4468],

        const badgeDefinitions = [
            { id: "first_step", name: "第一歩", icon: "👟", desc: "初めて市区町村を解放した" },
            { id: "trio", name: "三都物語", icon: "🏯", desc: "3つの市区町村を解放した" },
            { id: "level_five", name: "中堅旅人", icon: "🎒", desc: "10個の市区町村を解放した" },
            { id: "prefecture_master", name: "県内通", icon: "🗺️", desc: "同じ都道府県内で3つ以上解放した" },

        let appState = { unlockedCities: [], unlockedBadges: [] };
        let nihonData = null;
        let map;

        let currentCalendarDate = new Date();
        let selectedDateStr = "";

        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            setDefaultSimulatorDate();
            runBootAnimation();
        });

        function setDefaultSimulatorDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('simulator-date-input').value = `${yyyy}-${mm}-${dd}`;
        }

        function runBootAnimation() {
            setTimeout(() => document.getElementById('row1').classList.add('visible'), 200);
            setTimeout(() => document.getElementById('row2').classList.add('visible'), 500);
            setTimeout(() => {
                document.getElementById('row3').classList.add('visible');
                fetchNihonJson();
            }, 800);
        }

        async function fetchNihonJson() {
            const statusText = document.getElementById('json-status-text');
            try {
                const response = await fetch('Nihon.json');
                if (!response.ok) throw new Error("JSONファイルの取得に失敗しました");
                const rawData = await response.json();
                nihonData = Array.isArray(rawData) ? rawData[0] : rawData;
                statusText.innerText = "OK";
                statusText.className = "boot-success";
                setTimeout(() => document.getElementById('row4').classList.add('visible'), 300);
                loadData();
                renderBadges();
                updateUI();
                const today = new Date();
                selectedDateStr = formatDateKey(today);
                renderCalendar();
                renderMapForSelectedDate();
                setTimeout(() => {
                    document.getElementById('boot-spinner').style.display = 'none';
                    const startMsg = document.getElementById('start-msg');
                    startMsg.classList.add('visible');
                    setTimeout(() => {
                        const bootScreen = document.getElementById('boot-screen');
                        bootScreen.style.opacity = '0';
                        setTimeout(() => {
                            bootScreen.style.display = 'none';
                            if (map) map.invalidateSize();
                        }, 500);
                    }, 1800);
                }, 800);
            } catch (error) {
                console.error(error);
                statusText.innerText = "ERROR";
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([36.5, 137.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
            polylineGroup = L.layerGroup().addTo(map);
        }

        function formatDateKey(dateObj) {
            return `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function renderMapForSelectedDate() {
            if (!markersGroup || !polylineGroup) return;
            markersGroup.clearLayers();
            polylineGroup.clearLayers();
            const filteredCities = appState.unlockedCities.filter(item => item.date === selectedDateStr);
            if (filteredCities.length === 0) {
                document.getElementById('location-status').innerText = `${selectedDateStr} : 記録なし`;
                return;
            }
            document.getElementById('location-status').innerText = `${selectedDateStr} のルート`;
            filteredCities.forEach(item => {
                const customIcon = L.divIcon({ className: 'custom-marker', html: `<div style="width: 12px; height: 12px; background: #ff3b30; border: 2px solid #ffffff; border-radius: 50%;"></div>`, iconSize: [12, 12], iconAnchor: [6, 6] });
                L.marker([item.lat, item.lng], { icon: customIcon }).addTo(markersGroup);
            });
            if (filteredCities.length >= 2) {
                const coords = filteredCities.map(item => [item.lat, item.lng]);
                L.polyline(coords, { color: '#ff3b30', weight: 3.5, dashArray: '5, 5' }).addTo(polylineGroup);
                map.fitBounds(L.latLngBounds(coords), { padding: [30, 30] });
            } else if (filteredCities.length === 1) {
                map.setView([filteredCities[0].lat, filteredCities[0].lng], 12);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days-grid');
            const monthLabel = document.getElementById('calendar-month-year');
            grid.innerHTML = '';
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            monthLabel.innerText = `${year}年 ${String(month + 1).padStart(2, '0')}月`;
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDayIndex; i++) grid.appendChild(document.createElement('div'));
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                cell.innerText = day;
                const dateStr = `${year}/${String(month + 1).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
                if (appState.unlockedCities.some(c => c.date === dateStr)) cell.classList.add('has-history');
                if (dateStr === selectedDateStr) cell.classList.add('selected');
                cell.onclick = () => { selectedDateStr = dateStr; renderCalendar(); renderMapForSelectedDate(); updateHistoryDetails(); };
                grid.appendChild(cell);
            }
        }

        function changeMonth(direction) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction); renderCalendar(); }

        function updateHistoryDetails() {
            document.getElementById('detail-date-label').innerText = selectedDateStr;
            const citiesList = document.getElementById('detail-cities-list');
            const badgesList = document.getElementById('detail-badges-list');
            citiesList.innerHTML = ''; badgesList.innerHTML = '';
            const filteredCities = appState.unlockedCities.filter(item => item.date === selectedDateStr);
            filteredCities.forEach(c => { const li = document.createElement('li'); li.innerHTML = `🏁 ${c.cityName}`; citiesList.appendChild(li); });
            const filteredBadges = appState.unlockedBadges.filter(b => b.date === selectedDateStr);
            filteredBadges.forEach(fb => { const bDef = badgeDefinitions.find(b => b.id === fb.id); if (bDef) { const li = document.createElement('li'); li.innerHTML = `${bDef.icon} ${bDef.name}`; badgesList.appendChild(li); }});
        }

        function switchTab(tabId, title) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById('app-title').innerText = title;
            if (tabId === 'history') { renderCalendar(); updateHistoryDetails(); }
        }

        function renderBadges() {
            const container = document.getElementById('badge-container');
            if(!container) return;
            container.innerHTML = '';
            badgeDefinitions.forEach(badge => {
                const isUnlocked = appState.unlockedBadges.some(b => b.id === badge.id);
                const item = document.createElement('div');
                item.className = `badge-item ${isUnlocked ? 'unlocked' : ''}`;
                item.innerHTML = `<div class="badge-icon">${badge.icon}</div><div class="badge-name">${badge.name}</div>`;
                container.appendChild(item);
            });
        }

        function handleCheckIn() {
            // シンプル化: 位置情報テスト用
            showToast("📍 CHECK IN: 現在地を特定しました！");
            const dateStr = formatDateKey(new Date());
            appState.unlockedCities.push({ cityName: "仮の都市", date: dateStr, lat: 36.5, lng: 137.5 });
            saveData(); updateUI();
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "toast show"; setTimeout(() => t.className = "toast", 3000); }
        function saveData() { localStorage.setItem('geo_app', JSON.stringify(appState)); }
        function loadData() { const s = localStorage.getItem('geo_app'); if(s) appState = JSON.parse(s); }
        function updateUI() { /* UI更新 */ }
    </script>
</body>
</html>
