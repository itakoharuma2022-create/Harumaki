<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全国位置情報・実績解除アプリ</title>
    <!-- Leaflet.js のCSSとJS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 画面いっぱいに表示するための完全全画面設定 */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111216; /* 高級感のあるダーク背景 */
            color: #f3f4f6;
        }

        /* スマートフォン・タブレットなどあらゆる端末で画面いっぱいに広げる */
        .phone-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #111216;
        }

        /* 洗練されたダークモノトーンのヘッダー */
        header {
            background: rgba(17, 18, 22, 0.95);
            color: #ffffff;
            padding: 16px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #272a34;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        /* メインコンテンツエリア */
        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            padding-bottom: 70px; /* ナビバーの高さ */
        }

        #tab-home {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        .tab-content.active {
            display: block;
        }

        .scroll-content {
            padding: 24px 20px;
            height: 100%;
            overflow-y: auto;
            background-color: #111216;
        }

        /* 地図を完全に白黒（モノトーン）にするCSSフィルター */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #1a1b20;
            filter: grayscale(100%) invert(90%) hue-rotate(180deg) brightness(95%) contrast(105%);
        }

        /* マップ上に浮かぶ洗練されたUIレイアウト */
        .map-overlay {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        /* 高級感のあるボトムナビゲーションバー */
        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(17, 18, 22, 0.95);
            border-top: 1px solid #272a34;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(10px);
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneのノッチ対応 */
        }

        .nav-item {
            flex: 1;
            text-align: center;
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-item.active {
            color: #ffffff;
            font-weight: 700;
        }

        .nav-item.active svg {
            transform: translateY(-2px);
        }

        /* ミニマルで洗練されたボタン */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #111216;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
            background: #e2e8f0;
        }

        .btn-secondary {
            background: #272a34;
            color: #ffffff;
            border: 1px solid #3f4454;
            box-shadow: none;
        }

        .btn-secondary:active {
            background: #3f4454;
        }

        /* ダークモードに最適化したカードデザイン */
        .card {
            background: #181920;
            border: 1px solid #272a34;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: 0.03em;
        }

        /* フローティングステータス */
        .floating-status {
            background: rgba(24, 25, 32, 0.95);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: #94a3b8;
            border: 1px solid #272a34;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            backdrop-filter: blur(8px);
        }

        /* 実績グリッド */
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 12px;
        }

        .badge-item {
            background: #1e202a;
            border-radius: 14px;
            padding: 16px 8px;
            text-align: center;
            font-size: 0.75rem;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #272a34;
        }

        .badge-item.unlocked {
            filter: grayscale(0%);
            opacity: 1;
            background: #242736;
            border-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .badge-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .badge-name {
            font-weight: 700;
            color: #ffffff;
        }

        /* セレクトボックスの洗練 */
        .select-box {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #272a34;
            font-size: 0.95rem;
            margin-bottom: 16px;
            background-color: #1e202a;
            color: #ffffff;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        /* 通知トースト */
        .toast {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #ffffff;
            color: #111216;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            text-align: center;
            width: 85%;
            max-width: 340px;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* リストの美化 */
        ul {
            list-style: none;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #1e202a;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        
        li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 通知トースト -->
        <div id="toast" class="toast">実績を解除しました！</div>
        <header id="app-title">MAP ADVENTURE</header>

        <div class="content-area">
            <!-- 1. ホームタブ（マップ表示） -->
            <div id="tab-home" class="tab-content active">
                <div id="map"></div>
                <div class="map-overlay">
                    <div id="location-status" class="floating-status">INITIALIZING...</div>
                    <button class="btn" onclick="handleCheckIn()">📍 CHECK IN</button>
                </div>
            </div>

            <!-- 2. 実績タブ -->
            <div id="tab-achievements" class="tab-content">
                <div class="scroll-content">
                    <div class="card" style="margin-bottom: 20px; background: #1e202a; border: 1px solid #272a34;">
                        <div style="display:flex; justify-content:space-around; text-align:center;">
                            <div>
                                <div style="font-size:1.6rem; font-weight:800; color:#ffffff;" id="stats-count">0</div>
                                <div style="font-size:0.75rem; color:#94a3b8; margin-top:4px;">解放都市・区</div>
                            </div>
                            <div style="border-left: 1px solid #272a34;"></div>
                            <div>
                                <div style="font-size:1.6rem; font-weight:800; color:#ffffff;" id="stats-badges">0</div>
                                <div style="font-size:0.75rem; color:#94a3b8; margin-top:4px;">獲得実績</div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">ACHIEVEMENTS</div>
                        <div class="badge-grid" id="badge-container"></div>
                    </div>
                </div>
            </div>

            <!-- 3. 仮タブ（デバッグ用シミュレータ） -->
            <div id="tab-temp" class="tab-content">
                <div class="scroll-content">
                    <div class="card">
                        <div class="card-title">⚙️ DEBUG SIMULATOR</div>
                        <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 16px; line-height: 1.5;">
                            Nihon.json から読み込んだ全国の都市を擬似的に解放テストできます。
                        </p>
                        
                        <label style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 6px;">1. 都道府県を選択</label>
                        <select id="pref-selector" class="select-box" onchange="updateCitySelector()"></select>

                        <label style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 6px;">2. 市区町村を選択</label>
                        <select id="city-selector" class="select-box"></select>

                        <button class="btn btn-secondary" onclick="handleSimulateCheckIn()">選択した都市を擬似解放</button>
                    </div>
                    <div class="card">
                        <div class="card-title">DATA MANAGEMENT</div>
                        <button class="btn" style="background: #ef4444; color: white; box-shadow: none;" onclick="resetAllData()">データをすべて初期化</button>
                    </div>
                </div>
            </div>

            <!-- 4. プロフィールタブ -->
            <div id="tab-profile" class="tab-content">
                <div class="scroll-content">
                    <div class="card" style="text-align: center; background: linear-gradient(180deg, #1e202a 0%, #181920 100%);">
                        <div style="width: 64px; height: 64px; background: #272a34; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 12px; font-size: 1.8rem; border: 1px solid #3f4454;">👤</div>
                        <div class="card-title" style="margin-bottom: 4px;">EXPLORER</div>
                        <span style="background: #ffffff; color: #111216; padding: 4px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 800;">LV. <span id="profile-level">1</span></span>
                    </div>
                    <div class="card">
                        <div class="card-title">🧭 UNLOCKED CITIES</div>
                        <ul id="unlocked-cities-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="switchTab('home', 'MAP ADVENTURE')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                MAP
            </button>
            <button class="nav-item" onclick="switchTab('achievements', 'ACHIEVEMENTS')">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.25z"/></svg>
                BADGES
            </button>
            <button class="nav-item" onclick="switchTab('temp', 'DEBUG SIMULATOR')">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                DEBUG
            </button>
            <button class="nav-item" onclick="switchTab('profile', 'EXPLORER PROFILE')">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                PROFILE
            </button>
        </nav>
    </div>

    <script>
        // おおよその都道府県中心座標データ (地図の移動用)
        const prefCoordinates = {
            "01": [43.0621, 141.3544], "02": [40.8243, 140.7400], "03": [39.7036, 141.1527], "04": [38.2688, 140.8721],
            "05": [39.7186, 140.1033], "06": [38.2404, 140.3633], "07": [37.7503, 140.4676], "08": [36.3418, 140.4468],
            "09": [36.5658, 139.8836], "10": [36.3895, 139.0608], "11": [35.8570, 139.6489], "12": [35.6051, 140.1233],
            "13": [35.6895, 139.6917], "14": [35.4478, 139.6425], "15": [37.9022, 139.0236], "16": [36.6953, 137.2113],
            "17": [36.5947, 136.6256], "18": [36.0652, 136.2216], "19": [35.6639, 138.5683], "20": [36.6513, 138.1810],
            "21": [35.3912, 136.7224], "22": [34.9756, 138.3828], "23": [35.1802, 136.9067], "24": [34.7303, 136.5086],
            "25": [35.0045, 135.8686], "26": [35.0210, 135.7556], "27": [34.6863, 135.5200], "28": [34.6913, 135.1830],
            "29": [34.6853, 135.8327], "30": [34.2260, 135.1675], "31": [35.5036, 134.2377], "32": [35.4723, 133.0505],
            "33": [34.6618, 133.9344], "34": [34.3966, 132.4596], "35": [34.1860, 131.4705], "36": [34.0658, 134.5593],
            "37": [34.3401, 134.0434], "38": [33.8416, 132.7657], "39": [33.5597, 133.5311], "40": [33.6064, 130.4182],
            "41": [33.2494, 130.2988], "42": [32.7448, 129.8737], "43": [32.7904, 130.7410], "44": [33.2382, 131.6126],
            "45": [31.9111, 131.4239], "46": [31.5602, 130.5581], "47": [26.2124, 127.6809]
        };

        const badgeDefinitions = [
            { id: "first_step", name: "第一歩", icon: "👟", desc: "初めて市区町村を解放した" },
            { id: "trio", name: "三都物語", icon: "🏯", desc: "3つの市区町村を解放した" },
            { id: "level_five", name: "中堅旅人", icon: "🎒", desc: "10個の市区町村を解放した" },
            { id: "prefecture_master", name: "県内通", icon: "🗺️", desc: "同じ都道府県内で3つ以上解放した" },
            { id: "japan_conqueror", name: "天下統一", icon: "👑", desc: "50個以上の市区町村を解放した" }
        ];

        let appState = {
            unlockedCities: [],
            unlockedBadges: []
        };

        let nihonData = null;
        let map;
        let markersGroup;

        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            fetchNihonJson();
        });

        async function fetchNihonJson() {
            const statusEl = document.getElementById('location-status');
            try {
                const response = await fetch('Nihon.json');
                if (!response.ok) throw new Error("JSONファイルの取得に失敗しました");
                
                const rawData = await response.json();
                nihonData = Array.isArray(rawData) ? rawData[0] : rawData;
                
                statusEl.innerText = "READY TO EXPLORE";
                
                loadData();
                initPrefSelector();
                renderBadges();
                updateUI();
                renderMarkers();
                
            } catch (error) {
                console.error(error);
                statusEl.innerText = "ERROR: NIHON.JSON NOT FOUND";
                alert("Nihon.json の読み込みに失敗しました。リポジトリに正しく配置されているか確認してください。");
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([36.5, 137.5], 5);
            
            // 白黒・ダークデザインに馴染みやすいシンプルな地図レイヤーに変更
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);
            
            markersGroup = L.layerGroup().addTo(map);
        }

        function renderMarkers() {
            if (!markersGroup) return;
            markersGroup.clearLayers();
            appState.unlockedCities.forEach(item => {
                // ピンもモノトーンに合うカスタムスタイル（黒丸のシンプルなマーカー）
                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="width: 14px; height: 14px; background: #111216; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>`,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                });

                L.marker([item.lat, item.lng], { icon: customIcon })
                    .addTo(markersGroup)
                    .bindPopup(`<b style="color:#111216;">🎉 解放済み</b><br><span style="color:#333;">${item.cityName}</span>`);
            });
        }

        function initPrefSelector() {
            const prefSel = document.getElementById('pref-selector');
            prefSel.innerHTML = '';
            for (let i = 1; i <= 47; i++) {
                const prefId = String(i).padStart(2, '0');
                if (nihonData[prefId]) {
                    const opt = document.createElement('option');
                    opt.value = prefId;
                    opt.innerText = `${prefId}: ${nihonData[prefId].name}`;
                    prefSel.appendChild(opt);
                }
            }
            updateCitySelector();
        }

        function updateCitySelector() {
            const prefId = document.getElementById('pref-selector').value;
            const citySel = document.getElementById('city-selector');
            citySel.innerHTML = '';

            if (nihonData[prefId] && nihonData[prefId].city) {
                nihonData[prefId].city.forEach((c, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.innerText = c.city;
                    citySel.appendChild(opt);
                });
            }
        }

        function switchTab(tabId, title) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById('app-title').innerText = title;
            
            const navItems = document.querySelectorAll('.nav-item');
            if(tabId === 'home') {
                navItems[0].classList.add('active');
                if(map) setTimeout(() => map.invalidateSize(), 100);
            }
            if(tabId === 'achievements') navItems[1].classList.add('active');
            if(tabId === 'temp') navItems[2].classList.add('active');
            if(tabId === 'profile') navItems[3].classList.add('active');
        }

        function renderBadges() {
            const container = document.getElementById('badge-container');
            container.innerHTML = '';
            badgeDefinitions.forEach(badge => {
                const isUnlocked = appState.unlockedBadges.includes(badge.id);
                const item = document.createElement('div');
                item.className = `badge-item ${isUnlocked ? 'unlocked' : ''}`;
                item.innerHTML = `
                    <div class="badge-icon">${badge.icon}</div>
                    <div class="badge-name">${badge.name}</div>
                    <div style="font-size:0.6rem; color:#94a3b8; margin-top:6px;">${badge.desc}</div>
                `;
                container.appendChild(item);
            });
        }

        function handleCheckIn() {
            if (!nihonData) {
                showToast("⚠️ DATA NOT READY");
                return;
            }
            if (!navigator.geolocation) {
                showToast("⚠️ GPS NOT SUPPORTED");
                return;
            }

            document.getElementById('location-status').innerText = "TRACKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    let prefId = "13";
                    let minDist = 999;
                    
                    Object.keys(prefCoordinates).forEach(pId => {
                        const coord = prefCoordinates[pId];
                        const d = Math.sqrt(Math.pow(coord[0]-lat,2) + Math.pow(coord[1]-lng,2));
                        if(d < minDist) {
                            minDist = d;
                            prefId = pId;
                        }
                    });

                    const cities = nihonData[prefId].city;
                    const randIndex = Math.floor(Math.random() * cities.length);
                    const cityObj = cities[randIndex];

                    const baseCoord = prefCoordinates[prefId];
                    const offsetLat = baseCoord[0] + (Math.random() - 0.5) * 0.15;
                    const offsetLng = baseCoord[1] + (Math.random() - 0.5) * 0.15;

                    unlockCity(prefId, cityObj.city, cityObj.citycode, offsetLat, offsetLng);
                },
                (error) => {
                    const randPref = String(Math.floor(Math.random() * 47) + 1).padStart(2, '0');
                    const cities = nihonData[randPref].city;
                    const cityObj = cities[Math.floor(Math.random() * cities.length)];
                    const coord = prefCoordinates[randPref];
                    unlockCity(randPref, `デモ解放: ${cityObj.city}`, cityObj.citycode, coord[0], coord[1]);
                },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        function handleSimulateCheckIn() {
            if (!nihonData) return;
            const prefId = document.getElementById('pref-selector').value;
            const cityIndex = document.getElementById('city-selector').value;
            const cityObj = nihonData[prefId].city[cityIndex];
            
            const baseCoord = prefCoordinates[prefId];
            const offsetLat = baseCoord[0] + (Math.random() - 0.5) * 0.15;
            const offsetLng = baseCoord[1] + (Math.random() - 0.5) * 0.15;

            unlockCity(prefId, cityObj.city, cityObj.citycode, offsetLat, offsetLng);
            switchTab('home', 'MAP ADVENTURE');
        }

        function unlockCity(prefId, cityName, code, lat, lng) {
            const alreadyUnlocked = appState.unlockedCities.some(c => c.code === code);
            
            if (!alreadyUnlocked) {
                appState.unlockedCities.push({ prefId, cityName, code, lat, lng });
                showToast(`🎉 UNLOCKED: ${cityName}`);
            } else {
                showToast(`📍 ALREADY VISITED`);
            }

            document.getElementById('location-status').innerText = `LAST VISIT: ${cityName}`;
            
            if (map) {
                map.setView([lat, lng], 10, { animate: true, duration: 1.5 });
                setTimeout(() => renderMarkers(), 400);
            }

            checkAchievements();
            saveData();
            updateUI();
        }

        function checkAchievements() {
            const count = appState.unlockedCities.length;
            
            const checkAndUnlock = (badgeId, conditionTrue) => {
                if (conditionTrue && !appState.unlockedBadges.includes(badgeId)) {
                    appState.unlockedBadges.push(badgeId);
                    const b = badgeDefinitions.find(badge => badge.id === badgeId);
                    setTimeout(() => showToast(`🏆 UNLOCKED: 【${b.name}】`), 1000);
                }
            };

            checkAndUnlock("first_step", count >= 1);
            checkAndUnlock("trio", count >= 3);
            checkAndUnlock("level_five", count >= 10);
            checkAndUnlock("japan_conqueror", count >= 50);

            const prefCounts = {};
            appState.unlockedCities.forEach(c => {
                prefCounts[c.prefId] = (prefCounts[c.prefId] || 0) + 1;
            });
            const hasPrefMaster = Object.values(prefCounts).some(v => v >= 3);
            checkAndUnlock("prefecture_master", hasPrefMaster);
        }

        function updateUI() {
            document.getElementById('stats-count').innerText = appState.unlockedCities.length;
            document.getElementById('stats-badges').innerText = appState.unlockedBadges.length;

            const level = Math.floor(appState.unlockedCities.length / 3) + 1;
            document.getElementById('profile-level').innerText = level;

            const listEl = document.getElementById('unlocked-cities-list');
            listEl.innerHTML = '';
            if (appState.unlockedCities.length === 0) {
                listEl.innerHTML = '<li>No data. Start your adventure!</li>';
            } else {
                [...appState.unlockedCities].reverse().forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = `✓  ${item.cityName} (${item.code})`;
                    listEl.appendChild(li);
                });
            }
            renderBadges();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function saveData() {
            localStorage.setItem('geo_nihon_app_state_v4', JSON.stringify(appState));
        }

        function loadData() {
            const saved = localStorage.getItem('geo_nihon_app_state_v4');
            if (saved) {
                try {
                    appState = JSON.parse(saved);
                } catch(e) {
                    console.error(e);
                }
            }
        }

        function resetAllData() {
            if (confirm('すべての冒険記録を初期化しますか？')) {
                appState = { unlockedCities: [], unlockedBadges: [] };
                saveData();
                updateUI();
                if (markersGroup) markersGroup.clearLayers();
                if (map) map.setView([36.5, 137.5], 5);
                document.getElementById('location-status').innerText = "INITIALIZING...";
                showToast("RESET COMPLETED");
            }
        }
    </script>
</body>
</html>
